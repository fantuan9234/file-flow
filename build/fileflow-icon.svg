<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flow3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" rx="115" fill="url(#bgGrad)"/>
  
  <!-- 文件文档形状 -->
  <g transform="translate(176, 80)">
    <!-- 文档主体 -->
    <path d="M0 0 L100 0 L160 60 L160 200 L0 200 Z" fill="#ffffff" opacity="0.95"/>
    <!-- 折页效果 -->
    <path d="M100 0 L100 60 L160 60 Z" fill="#e5e7eb" opacity="0.8"/>
    <!-- 文档线条 -->
    <rect x="30" y="90" width="100" height="8" rx="4" fill="#9ca3af" opacity="0.6"/>
    <rect x="30" y="115" width="80" height="8" rx="4" fill="#9ca3af" opacity="0.6"/>
    <rect x="30" y="140" width="90" height="8" rx="4" fill="#9ca3af" opacity="0.6"/>
  </g>
  
  <!-- 流动弧线 -->
  <path d="M 100 340 Q 180 300 256 340 Q 332 380 412 340" 
        fill="none" stroke="url(#flow1)" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  
  <path d="M 80 370 Q 170 330 256 370 Q 342 410 432 370" 
        fill="none" stroke="url(#flow2)" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  
  <path d="M 100 400 Q 180 360 256 400 Q 332 440 412 400" 
        fill="none" stroke="url(#flow3)" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
</svg>
